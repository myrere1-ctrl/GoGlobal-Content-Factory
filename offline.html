<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Offline — GoGlobal AI Content Factory</title>
<style>
  body {
    font-family: -apple-system, 'Inter', sans-serif;
    background: #f8f9fa;
    color: #212529;
    min-height: 100vh;
    margin: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 24px;
  }
  .box { max-width: 360px; }
  .icon { font-size: 48px; margin-bottom: 16px; }
  h1 { font-size: 18px; margin: 0 0 8px; }
  p { font-size: 14px; color: #6c757d; line-height: 1.6; margin: 0; }
  button {
    margin-top: 20px;
    padding: 10px 20px;
    background: #2563eb;
    color: #fff;
    border: none;
    border-radius: 8px;
    font-size: 14px;
    cursor: pointer;
  }
</style>
</head>
<body>
  <div class="box">
    <div class="icon">📡</div>
    <h1>Kamu sedang offline</h1>
    <p>GoGlobal AI Content Factory butuh koneksi internet untuk generate konten dengan Claude API. Cek koneksi kamu lalu coba lagi.</p>
    <button onclick="location.reload()">Coba Lagi</button>
  </div>
</body>
</html>
